<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duyệt Tài Khoản - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f4f6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .stat-card h3 {
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-card p {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
    }

    .users-list {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .list-header {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }

    .filter-btn {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .user-item {
      padding: 20px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .user-item:hover {
      background: #f9fafb;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .user-meta {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .user-employee-id {
      font-size: 12px;
      background: #ede9fe;
      color: #6d28d9;
      padding: 4px 12px;
      border-radius: 6px;
      display: inline-block;
      font-weight: 500;
    }

    .user-date {
      font-size: 12px;
      color: #9ca3af;
      margin-left: 16px;
    }

    .user-actions {
      display: flex;
      gap: 12px;
    }

    .btn-approve,
    .btn-reject {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-approve {
      background: #10b981;
      color: white;
    }

    .btn-approve:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-reject {
      background: #ef4444;
      color: white;
    }

    .btn-reject:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .status-badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1f2937;
    }

    .modal-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-btn-cancel {
      background: #f3f4f6;
      color: #1f2937;
    }

    .modal-btn-cancel:hover {
      background: #e5e7eb;
    }

    .modal-btn-confirm {
      background: #667eea;
      color: white;
    }

    .modal-btn-confirm:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>👥 Duyệt Tài Khoản Người Dùng</h1>
      <p>Quản lý phê duyệt tài khoản mới để kiểm soát truy cập vào hệ thống</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h3>Chờ Duyệt</h3>
        <p id="pendingCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Đã Duyệt</h3>
        <p id="approvedCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Từ Chối</h3>
        <p id="rejectedCount">0</p>
      </div>
    </div>

    <!-- Users List -->
    <div class="users-list">
      <div class="list-header">
        <h2>Danh Sách Tài Khoản</h2>
        <div class="flex gap-2">
          <button class="filter-btn active" onclick="filterUsers('pending')">Chờ Duyệt</button>
          <button class="filter-btn" onclick="filterUsers('approved')">Đã Duyệt</button>
          <button class="filter-btn" onclick="filterUsers('rejected')">Từ Chối</button>
        </div>
      </div>

      <div id="usersList">
        <!-- Users will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal" id="confirmModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">Xác Nhận</div>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn" onclick="confirmAction()">Xác Nhận</button>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];
    let currentFilter = 'pending';
    let pendingAction = null;

    // Load users on page load
    window.addEventListener('load', () => {
      checkAuth();
      loadUsers();
      startAutoRefresh();
    });

    function checkAuth() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');

      if (!token || user.role !== 'admin') {
        window.location.href = 'login.html';
      }
    }

    async function loadUsers() {
      try {
        const response = await fetch('/api/auth/pending-users', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });

        const data = await response.json();
        if (data.success) {
          allUsers = data.users || [];
          updateStats();
          renderUsers();
        }
      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    function updateStats() {
      const pending = allUsers.filter(u => u.status === 'pending').length;
      const approved = allUsers.filter(u => u.status === 'approved').length;
      const rejected = allUsers.filter(u => u.status === 'rejected').length;

      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('approvedCount').textContent = approved;
      document.getElementById('rejectedCount').textContent = rejected;
    }

    function filterUsers(status) {
      currentFilter = status;

      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      renderUsers();
    }

    function renderUsers() {
      const filteredUsers = allUsers.filter(u => u.status === currentFilter);
      const usersList = document.getElementById('usersList');

      if (filteredUsers.length === 0) {
        usersList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>Không có tài khoản</h3>
            <p>Hiện tại không có tài khoản nào ${currentFilter === 'pending' ? 'chờ duyệt' : currentFilter === 'approved' ? 'đã duyệt' : 'bị từ chối'}.</p>
          </div>
        `;
        return;
      }

      usersList.innerHTML = filteredUsers.map(user => `
        <div class="user-item">
          <div class="user-info">
            <div class="user-name">
              ${user.fullname}
              <span class="status-badge status-${user.status}">
                ${user.status === 'pending' ? 'Chờ Duyệt' : user.status === 'approved' ? 'Đã Duyệt' : 'Từ Chối'}
              </span>
            </div>
            <div class="user-meta">
              📧 ${user.email}
            </div>
            ${user.employeeId ? `<div class="user-meta"><span class="user-employee-id">ID: ${user.employeeId}</span></div>` : ''}
            <div class="user-date">Đăng ký: ${new Date(user.createdAt).toLocaleDateString('vi-VN')}</div>
          </div>
          <div class="user-actions">
            ${currentFilter === 'pending' ? `
              <button class="btn-approve" onclick="showApproveModal('${user.id}', '${user.fullname}')">✓ Duyệt</button>
              <button class="btn-reject" onclick="showRejectModal('${user.id}', '${user.fullname}')">✕ Từ Chối</button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function showApproveModal(userId, userName) {
      pendingAction = { type: 'approve', userId };
      const modal = document.getElementById('confirmModal');
      document.getElementById('modalTitle').textContent = '✓ Phê Duyệt Tài Khoản';
      document.getElementById('modalText').textContent = `Bạn có chắc chắn muốn phê duyệt tài khoản của ${userName}?`;
      modal.classList.add('show');
    }

    function showRejectModal(userId, userName) {
      pendingAction = { type: 'reject', userId };
      const modal = document.getElementById('confirmModal');
      document.getElementById('modalTitle').textContent = '✕ Từ Chối Tài Khoản';
      document.getElementById('modalText').textContent = `Bạn có chắc chắn muốn từ chối tài khoản của ${userName}?`;
      modal.classList.add('show');
    }

    function closeModal() {
      document.getElementById('confirmModal').classList.remove('show');
      pendingAction = null;
    }

    async function confirmAction() {
      if (!pendingAction) return;

      const btn = document.getElementById('modalConfirmBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="loading-spinner"></div>';

      try {
        const response = await fetch(`/api/auth/${pendingAction.type}-user`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ userId: pendingAction.userId })
        });

        const data = await response.json();

        if (data.success) {
          closeModal();
          loadUsers();
        } else {
          alert('Lỗi: ' + data.message);
        }
      } catch (error) {
        alert('Lỗi khi xử lý: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Xác Nhận';
      }
    }

    function startAutoRefresh() {
      setInterval(() => {
        loadUsers();
      }, 30000); // Refresh every 30 seconds
    }
  </script>
</body>
</html>
