<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Dịch - FPT Automotive Translation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <!-- Header -->
    <header class="mb-8 rounded-[2rem] border border-slate-200/80 bg-white/90 p-6 shadow-[0_16px_48px_-28px_rgba(15,23,42,0.5)] backdrop-blur sm:p-7 dark:border-slate-800 dark:bg-slate-900/90">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight text-blue-700 sm:text-4xl dark:text-blue-300">Lịch Sử Dịch</h1>
          <p class="mt-2 text-base font-medium text-slate-600 dark:text-slate-400">Xem lại các bản dịch trước đó của bạn</p>
        </div>
        <button onclick="window.history.back()" class="inline-flex items-center gap-2 rounded-lg bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4">
            <path d="M15 19l-7-7 7-7"></path>
          </svg>
          Quay Lại
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
      <!-- Filter Section -->
      <div class="mb-6 space-y-4 border-b border-slate-200 pb-6 dark:border-slate-700">
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
          <!-- Search -->
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Tìm kiếm</label>
            <input
              type="text"
              id="searchInput"
              placeholder="Tìm kiếm trong lịch sử..."
              title="Tìm kiếm trong lịch sử"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-slate-600 dark:bg-slate-800 dark:focus:ring-blue-900"
            />
          </div>

          <!-- Language Filter -->
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Ngôn ngữ đích</label>
            <select id="languageFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-slate-600 dark:bg-slate-800 dark:focus:ring-blue-900" title="Lọc theo ngôn ngữ đích">
              <option value="">Tất cả ngôn ngữ</option>
              <option value="vi">Tiếng Việt</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
            </select>
          </div>

          <!-- Date Range -->
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Từ ngày</label>
            <input
              type="date"
              id="dateFrom"
              title="Chọn ngày bắt đầu"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-slate-600 dark:bg-slate-800 dark:focus:ring-blue-900"
            />
          </div>

          <!-- Sort -->
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Sắp xếp</label>
            <select id="sortFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-slate-600 dark:bg-slate-800 dark:focus:ring-blue-900" title="Chọn thứ tự sắp xếp">
              <option value="newest">Mới nhất trước</option>
              <option value="oldest">Cũ nhất trước</option>
            </select>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-2">
          <button onclick="resetFilters()" class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            ↻ Đặt lại bộ lọc
          </button>
          <button onclick="deleteAllHistory()" class="inline-flex items-center gap-2 rounded-lg border border-red-300 bg-red-50 px-4 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100 dark:border-red-900/30 dark:bg-red-900/20 dark:text-red-400 dark:hover:bg-red-900/30">
            🗑️ Xóa tất cả
          </button>
        </div>
      </div>

      <!-- History List -->
      <div id="historyContainer" class="space-y-4">
        <!-- Loading state -->
        <div id="loadingState" class="flex items-center justify-center py-12">
          <div class="text-center">
            <div class="mb-3 inline-block h-8 w-8 animate-spin rounded-full border-4 border-blue-200 border-t-blue-600"></div>
            <p class="text-sm text-slate-600 dark:text-slate-400">Đang tải lịch sử...</p>
          </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden rounded-lg border border-dashed border-slate-300 bg-slate-50 p-12 text-center dark:border-slate-700 dark:bg-slate-800/50">
          <p class="text-lg font-semibold text-slate-700 dark:text-slate-300">Bạn chưa có lịch sử dịch</p>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Hãy quay lại trang dịch để bắt đầu dịch thuật ngữ ô tô</p>
          <button onclick="window.location.href='web.html'" class="mt-4 inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
            Dịch Ngay
          </button>
        </div>

        <!-- History items -->
        <div id="historyItems"></div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    let allHistory = [];

    // Check authentication
    window.addEventListener('load', async () => {
      if (!Auth || !Auth.isAuthenticated()) {
        window.location.href = 'login.html';
        return;
      }

      loadHistory();
    });

    async function loadHistory() {
      try {
        // Get from localStorage first
        const localHistory = Auth.getTranslationHistory();
        
        // Try to get from backend
        let backendHistory = [];
        try {
          backendHistory = await Auth.getTranslationHistoryFromBackend();
        } catch (error) {
          console.warn('Failed to fetch backend history:', error);
        }

        // Merge and deduplicate
        allHistory = [...localHistory, ...backendHistory].reduce((acc, curr) => {
          const exists = acc.some(h => h.id === curr.id);
          if (!exists) acc.push(curr);
          return acc;
        }, []);

        // Sort by newest first
        allHistory.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        renderHistory(allHistory);
      } catch (error) {
        console.error('Error loading history:', error);
        showEmptyState();
      }
    }

    function renderHistory(history) {
      const loadingState = document.getElementById('loadingState');
      const emptyState = document.getElementById('emptyState');
      const historyItems = document.getElementById('historyItems');

      if (loadingState) loadingState.classList.add('hidden');

      if (!history || history.length === 0) {
        showEmptyState();
        return;
      }

      emptyState.classList.add('hidden');

      historyItems.innerHTML = history.map((item, index) => `
        <div class="rounded-lg border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-800/50">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-slate-700 dark:text-slate-300">Bản gốc:</p>
              <p class="mt-1 text-sm text-slate-900 break-words dark:text-slate-100">${escapeHtml(item.sourceText || item.source_text || 'N/A')}</p>
              
              <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4">
                ${renderTranslation(item, 'vi', 'Tiếng Việt')}
                ${renderTranslation(item, 'en', 'English')}
                ${renderTranslation(item, 'ja', '日本語')}
                ${renderTranslation(item, 'zh', '中文')}
              </div>
            </div>

            <div class="flex flex-col gap-2 flex-shrink-0">
              <button
                onclick="copyToClipboard('${escapeHtml((item.translations || item.vietnamese || '')).replace(/'/g, "\\'")}', ${index})"
                class="inline-flex items-center gap-2 rounded-md bg-blue-100 px-3 py-2 text-xs font-medium text-blue-700 transition hover:bg-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:hover:bg-blue-900/50"
              >
                📋 Copy
              </button>
              <button
                onclick="deleteHistoryItem('${item.id || index}')"
                class="inline-flex items-center gap-2 rounded-md bg-red-100 px-3 py-2 text-xs font-medium text-red-700 transition hover:bg-red-200 dark:bg-red-900/30 dark:text-red-300 dark:hover:bg-red-900/50"
              >
                🗑️ Xóa
              </button>
            </div>
          </div>

          <p class="mt-4 text-xs text-slate-500 dark:text-slate-400">
            ${formatDate(item.timestamp || item.savedAt)}
          </p>
        </div>
      `).join('');
    }

    function renderTranslation(item, lang, langLabel) {
      let translation = '';
      
      if (item.translations && typeof item.translations === 'object') {
        translation = item.translations[lang] || item.translations[langLabel] || '';
      } else if (lang === 'vi') {
        translation = item.vietnamese || item.translations || '';
      } else if (lang === 'en') {
        translation = item.english || '';
      } else if (lang === 'ja') {
        translation = item.japanese || '';
      } else if (lang === 'zh') {
        translation = item.chinese || '';
      }

      if (!translation) return '';

      return `
        <div class="rounded-md bg-white p-2 dark:bg-slate-700">
          <p class="text-xs font-semibold text-slate-600 dark:text-slate-300">${langLabel}</p>
          <p class="mt-1 text-sm text-slate-900 dark:text-slate-100">${escapeHtml(translation)}</p>
        </div>
      `;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;

      if (diff < 60000) return 'Vừa xong';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)} ngày trước`;

      return date.toLocaleDateString('vi-VN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function copyToClipboard(text, index) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target.closest('button');
        const originalText = btn.textContent;
        btn.textContent = '✓ Đã copy';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      });
    }

    function deleteHistoryItem(itemId) {
      if (!confirm('Bạn chắc chắn muốn xóa bản dịch này?')) return;

      allHistory = allHistory.filter(h => h.id !== itemId);
      localStorage.setItem('translationHistory', JSON.stringify(allHistory));
      renderHistory(allHistory);
    }

    function deleteAllHistory() {
      if (!confirm('Bạn chắc chắn muốn xóa tất cả lịch sử dịch? Hành động này không thể hoàn tác.')) return;

      allHistory = [];
      localStorage.removeItem('translationHistory');
      renderHistory([]);
      showEmptyState();
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('languageFilter').value = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('sortFilter').value = 'newest';
      renderHistory(allHistory);
    }

    function showEmptyState() {
      const loadingState = document.getElementById('loadingState');
      const emptyState = document.getElementById('emptyState');
      const historyItems = document.getElementById('historyItems');

      if (loadingState) loadingState.classList.add('hidden');
      emptyState.classList.remove('hidden');
      historyItems.innerHTML = '';
    }

    // Add event listeners for filtering
    document.getElementById('searchInput')?.addEventListener('input', filterHistory);
    document.getElementById('languageFilter')?.addEventListener('change', filterHistory);
    document.getElementById('dateFrom')?.addEventListener('change', filterHistory);
    document.getElementById('sortFilter')?.addEventListener('change', filterHistory);

    function filterHistory() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const language = document.getElementById('languageFilter').value;
      const dateFrom = new Date(document.getElementById('dateFrom').value);
      const sortOrder = document.getElementById('sortFilter').value;

      let filtered = allHistory.filter(item => {
        const sourceMatch = !searchTerm || (item.sourceText || item.source_text || '').toLowerCase().includes(searchTerm);
        const dateMatch = !document.getElementById('dateFrom').value || new Date(item.timestamp || item.savedAt) >= dateFrom;
        
        let languageMatch = true;
        if (language) {
          const translations = item.translations || {};
          const hasLanguage = translations[language] || (language === 'vi' && item.vietnamese);
          languageMatch = !!hasLanguage;
        }

        return sourceMatch && dateMatch && languageMatch;
      });

      if (sortOrder === 'oldest') {
        filtered.reverse();
      }

      renderHistory(filtered);
    }
  </script>
</body>
</html>
