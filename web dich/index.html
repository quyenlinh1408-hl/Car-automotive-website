<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPT Automotive Translation</title>
  <meta http-equiv="refresh" content="0; url=web.html" />
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
    }

    .card {
      width: min(92vw, 520px);
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 40px -28px rgba(15, 23, 42, 0.4);
      text-align: center;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      color: #001a4d;
      margin: 0 0 10px;
    }

    .desc {
      margin: 0 0 20px;
      color: #334155;
      font-size: 14px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      background: #0056b3;
      color: #ffffff;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
  <script>
    window.location.replace('web.html');
  </script>
</head>
<body>
  <main class="card">
    <h1 class="brand">FPT Automotive Translation</h1>
    <p class="desc">Dang chuyen ban den trang web chinh. Neu trinh duyet chan tu dong chuyen trang, bam nut ben duoi.</p>
    <a class="button" href="web.html">Mo Trang Chinh</a>
    <p class="hint">GitHub Pages ready: index.html -> web.html</p>
  </main>
</body>
</html>
