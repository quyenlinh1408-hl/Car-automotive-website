<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký - SV FPT Automotive Translation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      border: 1px solid #e5e7eb;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #0056b3 0%, #003d82 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      color: white;
      font-weight: 700;
    }

    .header h1 {
      font-size: 28px;
      color: #0056b3;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .header p {
      font-size: 14px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
      background: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: #0056b3;
      box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
      background: #f9fafb;
    }

    input::placeholder {
      color: #9ca3af;
    }

    .password-strength {
      margin-top: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      background: #d1d5db;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #ef4444;
    }

    .password-strength-bar.medium {
      width: 66%;
      background: #f59e0b;
    }

    .password-strength-bar.strong {
      width: 100%;
      background: #22c55e;
    }

    .btn-register {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #0056b3 0%, #003d82 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 24px;
      margin-bottom: 16px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 86, 179, 0.3);
    }

    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .terms-note {
      text-align: center;
      margin: 16px 0;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    .terms-note a {
      color: #0056b3;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .terms-note a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    .footer p {
      font-size: 13px;
      color: #6b7280;
    }

    .footer a {
      color: #0056b3;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #003d82;
      text-decoration: underline;
    }

    .error-message {
      padding: 12px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #991b1b;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      padding: 12px;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      color: #166534;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 86, 179, 0.3);
      border-top-color: #0056b3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">🚗</div>
      <h1>SV FPT Automotive</h1>
      <p>Tạo Tài Khoản Mới</p>
    </div>

    <!-- Messages -->
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

  <!-- Register Container -->
  <div class="register-container glass">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        🚗
      </div>
      <div class="logo-text">
        <h1>SV FPT Automotive</h1>
        <p>Tạo tài khoản</p>
      </div>
    </div>

    <!-- Messages -->
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <!-- Register Form -->
    <form id="registerForm">
      <div class="form-group">
        <label>Họ Và Tên</label>
        <input
          type="text"
          id="fullname"
          placeholder="Nguyễn Văn A"
          required
        />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          id="email"
          placeholder="email@sv.fpt.edu.vn"
          required
        />
      </div>

      <div class="form-group">
        <label>Mã Nhân Viên (Tùy Chọn)</label>
        <input
          type="text"
          id="employeeId"
          placeholder="SVFPT-001234"
        />
      </div>

      <div class="form-group">
        <label>Mật Khẩu</label>
        <input
          type="password"
          id="password"
          placeholder="Tối thiểu 8 ký tự"
          required
        />
        <div class="password-strength">
          <div class="password-strength-bar" id="passwordBar"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Xác Nhận Mật Khẩu</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Nhập lại mật khẩu"
          required
        />
      </div>

      <button type="submit" class="btn-register" id="registerBtn">
        <span id="btnText">ĐĂNG KÝ</span>
      </button>
    </form>

    <!-- Terms -->
    <div class="terms-note">
      Bằng cách đăng ký, bạn đồng ý với <a>Điều khoản sử dụng</a><br/>
      Tài khoản cần được Admin phê duyệt trước khi sử dụng.
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Đã có tài khoản? <a onclick="goToLogin()">Đăng nhập</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const employeeIdInput = document.getElementById('employeeId');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const registerBtn = document.getElementById('registerBtn');
    const btnText = document.getElementById('btnText');
    const passwordBar = document.getElementById('passwordBar');

    // Password strength indicator
    passwordInput.addEventListener('input', (e) => {
      const password = e.target.value;
      const strength = calculatePasswordStrength(password);
      
      passwordBar.className = 'password-strength-bar ' + strength.level;
    });

    function calculatePasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/\d/.test(password)) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[a-z]/.test(password)) strength++;
      if (/[!@#$%^&*]/.test(password)) strength++;

      if (strength <= 2) return { level: 'weak', score: 1 };
      if (strength <= 4) return { level: 'medium', score: 2 };
      return { level: 'strong', score: 3 };
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullname = fullnameInput.value.trim();
      const email = emailInput.value.trim();
      const employeeId = employeeIdInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // Clear previous messages
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      // Validation
      if (!fullname || !email || !password) {
        errorMessage.textContent = 'Vui lòng điền đầy đủ thông tin bắt buộc.';
        errorMessage.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errorMessage.textContent = 'Mật khẩu phải có ít nhất 8 ký tự.';
        errorMessage.classList.add('show');
        return;
      }

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Mật khẩu xác nhận không khớp.';
        errorMessage.classList.add('show');
        return;
      }

      // Disable button during submission
      registerBtn.disabled = true;
      btnText.innerHTML = '<div class="loading-spinner"></div>';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fullname,
            email,
            employeeId,
            password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Đăng ký thất bại. Vui lòng thử lại.');
        }

        successMessage.textContent = 'Đăng ký thành công! Vui lòng chờ Admin phê duyệt tài khoản. Chuyển hướng sau 3 giây...';
        successMessage.classList.add('show');

        // Reset form
        form.reset();
        passwordBar.className = 'password-strength-bar';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 3000);
      } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.add('show');
      } finally {
        registerBtn.disabled = false;
        btnText.textContent = 'ĐĂNG KÝ';
      }
    });

    function goToLogin() {
      window.location.href = 'login.html';
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'web.html';
      }
    });
  </script>
</body>
</html>
