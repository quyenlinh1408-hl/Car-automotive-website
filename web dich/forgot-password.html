<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên Mật khẩu - SV FPT Automotive Translation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 100%;
      background: rgba(255, 255, 255, 0.1);
      filter: blur(40px);
      animation: blob-animation 15s infinite;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      top: -50px;
      left: -50px;
    }

    .blob-2 {
      width: 250px;
      height: 250px;
      bottom: -50px;
      right: -50px;
      animation-delay: 7s;
    }

    @keyframes blob-animation {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -50px); }
      66% { transform: translate(-20px, 20px); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    .form-input {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      font-size: 14px;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 1);
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 32px;
    }

    .logo-text h1 {
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .logo-text p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
    }

    .message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: rgba(255, 255, 255, 0.95);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
    }

    .form-footer a {
      color: rgba(255, 255, 255, 1);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .intro-copy {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .footer-top-space {
      margin-top: 24px;
    }

    .form-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      margin-bottom: 4px;
      display: block;
      font-weight: 500;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-indicator {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .step-indicator span {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      line-height: 24px;
      margin: 0 4px;
      font-weight: 600;
    }

    .step-indicator span.active {
      background: rgba(102, 126, 234, 1);
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .resend-link {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
    }

    .resend-link a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      cursor: pointer;
    }

    .resend-link a:hover {
      text-decoration: underline;
    }

    .countdown {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container glass">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        🔐
      </div>
      <div class="logo-text">
        <h1>Khôi phục mật khẩu</h1>
        <p>SV FPT Automotive Translation</p>
      </div>
    </div>

    <!-- Messages -->
    <div class="message" id="message"></div>

    <!-- Step 1: Email Input -->
    <div class="step active" id="step1">
      <div class="step-indicator">
        <span class="active">1</span>
        <span>2</span>
      </div>

      <p class="intro-copy">
        Nhập email của bạn và chúng tôi sẽ gửi hướng dẫn khôi phục mật khẩu.
      </p>

      <form id="emailForm">
        <label class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="email@sv.fpt.edu.vn"
          required
        />

        <button type="submit" class="btn-submit" id="emailBtn">
          <span id="emailBtnText">TIẾP TỤC</span>
        </button>
      </form>

      <div class="form-footer">
        Quay lại <a onclick="goToLogin()">Đăng nhập</a>
      </div>
    </div>

    <!-- Step 2: Verification Code & New Password -->
    <div class="step" id="step2">
      <div class="step-indicator">
        <span class="active">1</span>
        <span class="active">2</span>
      </div>

      <p class="intro-copy">
        Nhập mã xác nhận được gửi đến email của bạn.
      </p>

      <form id="resetForm">
        <label class="form-label">Mã Xác Nhận</label>
        <input
          type="text"
          id="verificationCode"
          class="form-input"
          placeholder="Nhập mã 6 ký tự"
          maxlength="6"
          required
        />

        <label class="form-label">Mật khẩu Mới</label>
        <input
          type="password"
          id="newPassword"
          class="form-input"
          placeholder="Mật khẩu mới (tối thiểu 8 ký tự)"
          required
        />

        <label class="form-label">Xác Nhận Mật khẩu</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-input"
          placeholder="Xác nhận mật khẩu"
          required
        />

        <button type="submit" class="btn-submit" id="resetBtn">
          <span id="resetBtnText">CẬP NHẬT MẬT KHẨU</span>
        </button>
      </form>

      <div class="resend-link">
        Không nhận được mã? 
        <a onclick="resendCode()">Gửi lại</a>
        <span class="countdown" id="countdown"></span>
      </div>

      <div class="form-footer footer-top-space">
        <a onclick="backToStep1()">← Quay lại</a>
      </div>
    </div>
  </div>

  <script>
    let resendCountdown = 0;
    let currentEmail = '';

    const emailForm = document.getElementById('emailForm');
    const resetForm = document.getElementById('resetForm');
    const emailInput = document.getElementById('email');
    const verificationCodeInput = document.getElementById('verificationCode');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const message = document.getElementById('message');
    const emailBtn = document.getElementById('emailBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Step 1: Request password reset
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      message.classList.remove('show', 'success');

      emailBtn.disabled = true;
      document.getElementById('emailBtnText').innerHTML = '<div class="loading-spinner"></div>';

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Không thể gửi email khôi phục.');
        }

        currentEmail = email;
        resendCountdown = 60;
        startCountdown();

        // Go to step 2
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');

        message.textContent = 'Mã xác nhận đã được gửi đến email của bạn.';
        message.classList.add('show', 'success');
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('show');
      } finally {
        emailBtn.disabled = false;
        document.getElementById('emailBtnText').textContent = 'TIẾP TỤC';
      }
    });

    // Step 2: Reset password
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const verificationCode = verificationCodeInput.value.trim();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      message.classList.remove('show', 'success');

      if (newPassword !== confirmPassword) {
        message.textContent = 'Mật khẩu xác nhận không khớp.';
        message.classList.add('show');
        return;
      }

      if (newPassword.length < 8) {
        message.textContent = 'Mật khẩu phải có ít nhất 8 ký tự.';
        message.classList.add('show');
        return;
      }

      resetBtn.disabled = true;
      document.getElementById('resetBtnText').innerHTML = '<div class="loading-spinner"></div>';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentEmail,
            verificationCode,
            newPassword
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Không thể cập nhật mật khẩu.');
        }

        message.textContent = 'Mật khẩu đã được cập nhật thành công. Chuyển hướng đến đăng nhập...';
        message.classList.add('show', 'success');

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('show');
      } finally {
        resetBtn.disabled = false;
        document.getElementById('resetBtnText').textContent = 'CẬP NHẬT MẬT KHẨU';
      }
    });

    function backToStep1() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      message.classList.remove('show', 'success');
    }

    function goToLogin() {
      window.location.href = 'login.html';
    }

    function resendCode() {
      if (resendCountdown > 0) return;

      fetch('/api/auth/resend-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: currentEmail })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          resendCountdown = 60;
          startCountdown();
          message.textContent = 'Mã xác nhận mới đã được gửi.';
          message.classList.add('show', 'success');
        }
      })
      .catch(() => {
        message.textContent = 'Lỗi khi gửi lại mã.';
        message.classList.add('show');
      });
    }

    function startCountdown() {
      const countdown = document.getElementById('countdown');
      const interval = setInterval(() => {
        resendCountdown--;
        if (resendCountdown <= 0) {
          clearInterval(interval);
          countdown.textContent = '';
        } else {
          countdown.textContent = ` (${resendCountdown}s)`;
        }
      }, 1000);
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'web.html';
      }
    });
  </script>
</body>
</html>
